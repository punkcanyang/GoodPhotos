<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2d34" />
      <stop offset="50%" stop-color="#141518" />
      <stop offset="100%" stop-color="#0a0a0c" />
    </linearGradient>
    
    <!-- Aperture Blade Gradients -->
    <linearGradient id="blade1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <linearGradient id="blade2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4facfe" />
      <stop offset="100%" stop-color="#7f53ac" />
    </linearGradient>
    <linearGradient id="blade3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7f53ac" />
      <stop offset="100%" stop-color="#647dee" />
    </linearGradient>

    <!-- AI Core Glow -->
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="30%" stop-color="#00f2fe" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#7f53ac" stop-opacity="0" />
    </radialGradient>

    <!-- Drop Shadow for 3D effect -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Base Squircle -->
  <rect x="64" y="64" width="896" height="896" rx="224" ry="224" fill="url(#bgGrad)" filter="url(#dropShadow)" />
  
  <!-- Subtle inner border -->
  <rect x="64" y="64" width="896" height="896" rx="224" ry="224" fill="none" stroke="#ffffff" stroke-opacity="0.1" stroke-width="4" />

  <!-- The Lens / Aperture Ring -->
  <g transform="translate(512, 512)">
    <!-- Outer Ring -->
    <circle cx="0" cy="0" r="300" fill="none" stroke="#333740" stroke-width="16" />
    <circle cx="0" cy="0" r="300" fill="none" stroke="url(#blade1)" stroke-width="4" stroke-opacity="0.5" stroke-dasharray="100, 50" />
    
    <!-- Aperture Blades (overlapping polygons) -->
    <!-- Blade 1 -->
    <polygon points="-80,-80 280,-120 180,180" fill="url(#blade1)" opacity="0.85" style="mix-blend-mode: screen;" transform="rotate(0)" />
    <!-- Blade 2 -->
    <polygon points="-80,-80 280,-120 180,180" fill="url(#blade2)" opacity="0.85" style="mix-blend-mode: screen;" transform="rotate(72)" />
    <!-- Blade 3 -->
    <polygon points="-80,-80 280,-120 180,180" fill="url(#blade3)" opacity="0.85" style="mix-blend-mode: screen;" transform="rotate(144)" />
    <!-- Blade 4 -->
    <polygon points="-80,-80 280,-120 180,180" fill="url(#blade1)" opacity="0.85" style="mix-blend-mode: screen;" transform="rotate(216)" />
    <!-- Blade 5 -->
    <polygon points="-80,-80 280,-120 180,180" fill="url(#blade2)" opacity="0.85" style="mix-blend-mode: screen;" transform="rotate(288)" />
    
    <!-- AI Core Sparkle (Center) -->
    <circle cx="0" cy="0" r="120" fill="url(#coreGlow)" />
    
    <!-- Diamond spark symbol -->
    <path d="M0 -60 Q 0 0 60 0 Q 0 0 0 60 Q 0 0 -60 0 Q 0 0 0 -60 Z" fill="#ffffff" opacity="0.9" />
  </g>
</svg>
